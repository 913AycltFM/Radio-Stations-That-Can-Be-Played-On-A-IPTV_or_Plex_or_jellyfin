name: Update Radio EPG Metadata

on:
  schedule:
    - cron: '*/5'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Execute EPG Generator Script
      run: python generate_radio_epg.py

    - name: Commit and Push Updated EPG File
      run: |
        git config --global user.name "GitHub Action EPG Bot"
        git config --global user.email "actions@github.com"
        git add epg.xml
        # This safely pulls your current branch name automatically:
        CURRENT_BRANCH=${GITHUB_REF##*/}
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live track data [skip ci]" && git push origin HEAD:$CURRENT_BRANCH)
