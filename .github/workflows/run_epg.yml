name: Update Radio EPG Metadata

on:
  schedule:
    - cron: '*/5'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Fetch APIs and Generate XMLTV File
      run: |
        # 1. Fetch live raw JSON streams from your AzuraCast endpoints
        MAIN_JSON=$(curl -s "https://radio.913aycltfm.com/api/nowplaying_static/91.3_ayclt_fm.json")
        HD2_JSON=$(curl -s "https://radio.913aycltfm.com/api/nowplaying_static/91.3_ayclt_fm_hd2.json")
        HD3_JSON=$(curl -s "https://radio.913aycltfm.com/api/nowplaying_static/91.3_ayclt_fm_hd3.json")

        # 2. Extract song fields safely using native jq (bulletproof against special characters)
        M_TITLE=$(echo "$MAIN_JSON" | jq -r '.now_playing.song.title // "91.3 Ayclt FM Live Stream"')
        M_ARTIST=$(echo "$MAIN_JSON" | jq -r '.now_playing.song.artist // "Dickinson, Texas"')
        M_ART=$(echo "$MAIN_JSON" | jq -r '.now_playing.song.art // ""')
        M_START=$(echo "$MAIN_JSON" | jq -r '(.now_playing.played_at // now) | strflocaltime("%Y%m%d%H%M%S -0500")')
        M_STOP=$(echo "$MAIN_JSON" | jq -r '(.now_playing.played_at // now) + (.now_playing.duration // 240) | strflocaltime("%Y%m%d%H%M%S -0500")')

        HD2_TITLE=$(echo "$HD2_JSON" | jq -r '.now_playing.song.title // "91.3 Ayclt FM HD2 Live Stream"')
        HD2_ARTIST=$(echo "$HD2_JSON" | jq -r '.now_playing.song.artist // "Dickinson, Texas"')
        HD2_ART=$(echo "$HD2_JSON" | jq -r '.now_playing.song.art // ""')
        HD2_START=$(echo "$HD2_JSON" | jq -r '(.now_playing.played_at // now) | strflocaltime("%Y%m%d%H%M%S -0500")')
        HD2_STOP=$(echo "$HD2_JSON" | jq -r '(.now_playing.played_at // now) + (.now_playing.duration // 240) | strflocaltime("%Y%m%d%H%M%S -0500")')

        HD3_TITLE=$(echo "$HD3_JSON" | jq -r '.now_playing.song.title // "91.3 Ayclt FM HD3 Live Stream"')
        HD3_ARTIST=$(echo "$HD3_JSON" | jq -r '.now_playing.song.artist // "Dickinson, Texas"')
        HD3_ART=$(echo "$HD3_JSON" | jq -r '.now_playing.song.art // ""')
        HD3_START=$(echo "$HD3_JSON" | jq -r '(.now_playing.played_at // now) | strflocaltime("%Y%m%d%H%M%S -0500")')
        HD3_STOP=$(echo "$HD3_JSON" | jq -r '(.now_playing.played_at // now) + (.now_playing.duration // 240) | strflocaltime("%Y%m%d%H%M%S -0500")')

        # 3. Construct and compile the final XMLTV file format directly
        cat <<EOF > epg.xml
<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE tv SYSTEM "xmltv.dtd">
<tv generator-info-name="RadioEPG">
  <channel id="913AycltFM">
    <display-name>1</display-name>
    <display-name>91.3 Ayclt FM</display-name>
  </channel>
  <channel id="913AycltFMHD2">
    <display-name>2</display-name>
    <display-name>91.3 Ayclt FM HD2</display-name>
  </channel>
  <channel id="913AycltFMHD3">
    <display-name>3</display-name>
    <display-name>91.3 Ayclt FM HD3</display-name>
  </channel>
  
  <programme start="$M_START" stop="$M_STOP" channel="913AycltFM">
    <title lang="en">$M_TITLE</title>
    <sub-title lang="en">$M_ARTIST</sub-title>
    <desc lang="en">Dickinson's Texas #1 Hit Music Station</desc>
    $( [ ! -z "$M_ART" ] && [ "$M_ART" != "null" ] && echo "<icon src=\"$M_ART\" />" )
  </programme>

  <programme start="$HD2_START" stop="$HD2_STOP" channel="913AycltFMHD2">
    <title lang="en">$HD2_TITLE</title>
    <sub-title lang="en">$HD2_ARTIST</sub-title>
    <desc lang="en">Now Playing on 91.3 Ayclt FM HD2</desc>
    $( [ ! -z "$HD2_ART" ] && [ "$HD2_ART" != "null" ] && echo "<icon src=\"$HD2_ART\" />" )
  </programme>

  <programme start="$HD3_START" stop="$HD3_STOP" channel="913AycltFMHD3">
    <title lang="en">$HD3_TITLE</title>
    <sub-title lang="en">$HD3_ARTIST</sub-title>
    <desc lang="en">Now Playing on 91.3 Ayclt FM HD3</desc>
    $( [ ! -z "$HD3_ART" ] && [ "$HD3_ART" != "null" ] && echo "<icon src=\"$HD3_ART\" />" )
  </programme>
</tv>
EOF

    - name: Commit and Push New XML file
      run: |
        git config --global user.name "GitHub Action EPG Bot"
        git config --global user.email "actions@github.com"
        git add epg.xml
        git commit -m "Auto-update live track XML data [skip ci]" || exit 0
        git push origin HEAD:main
