name: Update Radio EPG Metadata

on:
  schedule:
    # Runs automatically every 5 minutes (GitHub's maximum frequency for free accounts)
    - cron: '*/5'
  workflow_dispatch: # Allows you to manually click a button to run it anytime

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Execute EPG Generator Script
      run: python generate_radio_epg.py

    - name: Commit and Push Updated EPG File
      run: |
        git config --global user.name "GitHub Action EPG Bot"
        git config --global user.email "actions@github.com"
        git add epg.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live track data [skip ci]" && git push)
